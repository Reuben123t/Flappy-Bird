<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flappy Bird</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }
        
        body {
            background: linear-gradient(135deg, #1a2a6c, #b21f1f, #1a2a6c);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 10px;
            color: #fff;
            overflow-x: hidden;
        }
        
        .container {
            display: flex;
            max-width: 1200px;
            width: 100%;
            gap: 20px;
        }
        
        .game-section {
            flex: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }
        
        .stats-section {
            flex: 1;
            background: rgba(0, 0, 0, 0.7);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        h1 {
            text-align: center;
            font-size: 2.5rem;
            margin-bottom: 10px;
            color: #FFD700;
            text-shadow: 2px 2px 0px #000;
            font-family: 'Courier New', Courier, monospace;
            font-weight: 900;
            letter-spacing: -2px;
        }
        
        .game-container {
            position: relative;
            width: 100%;
            max-width: 360px;
            height: 640px;
            background: #70c5ce; /* Classic Flappy Sky Color */
            border: 4px solid #543847;
            border-radius: 4px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            margin: 20px 0;
        }
        
        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            image-rendering: pixelated; /* Keeps pixel art crisp */
        }
        
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            pointer-events: none;
        }
        
        .title {
            font-size: 48px;
            font-weight: 900;
            color: #fc7421;
            -webkit-text-stroke: 2px #fff;
            text-shadow: 4px 4px 0 #000;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
        }
        
        .score-display {
            font-size: 60px;
            font-weight: bold;
            color: white;
            text-shadow: 3px 3px 0 #000;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
        }
        
        .current-score {
            position: absolute;
            top: 50px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 50px;
            font-weight: 900;
            color: white;
            text-shadow: 3px 3px 0 #000;
            z-index: 20;
            pointer-events: none;
            font-family: 'Courier New', monospace;
        }
        
        .btn {
            background: #e04b19;
            color: white;
            border: 2px solid #fff;
            padding: 15px 30px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            box-shadow: 0 4px 0 #8b2d0f;
            margin-top: 30px;
            pointer-events: auto;
            transition: transform 0.1s;
            width: 200px;
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
        }
        
        .btn:hover {
            background: #ff5e2e;
            transform: translateY(-2px);
        }
        
        .btn:active {
            transform: translateY(2px);
            box-shadow: 0 0 0 #8b2d0f;
        }
        
        .instructions {
            position: absolute;
            bottom: 140px;
            color: white;
            text-align: center;
            width: 100%;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
            animation: bounce 1.5s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .panel {
            background: rgba(30, 30, 50, 0.8);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
            border: 2px solid #555;
        }
        
        .panel h2 {
            color: #FFD700;
            text-align: center;
            margin-bottom: 15px;
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        
        .high-scores-list {
            list-style-type: none;
            padding: 0;
        }
        
        .high-scores-list li {
            padding: 10px;
            margin: 8px 0;
            background: rgba(50, 50, 70, 0.6);
            border-radius: 5px;
            display: flex;
            justify-content: space-between;
            font-size: 1.1rem;
            font-family: monospace;
        }
        
        .high-scores-list li:nth-child(1) {
            background: linear-gradient(90deg, rgba(255,215,0,0.2), rgba(255,215,0,0.4));
            border: 1px solid #FFD700;
            color: #FFD700;
        }
        
        .last-score-value {
            font-size: 3rem;
            text-align: center;
            color: #4CAF50;
            font-weight: 900;
            margin: 10px 0;
            text-shadow: 2px 2px 0 #000;
            font-family: 'Courier New', monospace;
        }
        
        .reset-btn {
            background: #d32f2f;
            width: 100%;
            margin-top: 10px;
            border: none;
            box-shadow: 0 4px 0 #9a0007;
        }
        
        .reset-btn:hover {
            background: #f44336;
        }
        
        .reset-btn:active {
            box-shadow: none;
            transform: translateY(4px);
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .control-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 10px;
        }
        
        .control-label {
            font-weight: bold;
            color: #ccc;
        }
        
        select {
            background: #eee;
            color: #333;
            border: 2px solid #999;
            padding: 5px 10px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
        }
        
        .footer {
            text-align: center;
            margin-top: 20px;
            color: #aaa;
            font-size: 0.8rem;
        }

        /* Touch controls */
        .touch-controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: none; /* Hidden on desktop by default */
            justify-content: center;
            z-index: 25;
            pointer-events: none; /* Let clicks pass through except button */
        }
        
        /* Mobile styles */
        @media (max-width: 900px) {
            .container {
                flex-direction: column;
            }
            .stats-section {
                order: 2; /* Move stats below game on mobile */
            }
            .game-section {
                padding: 10px;
            }
            .game-container {
                max-width: 100%;
                height: 70vh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="game-section">
            <h1>FLAPPY BIRD</h1>
            
            <div class="game-container">
                <canvas id="game-canvas" width="360" height="640"></canvas>
                
                <div class="current-score" id="current-score">0</div>
                
                <div class="ui-overlay" id="start-screen">
                    <h1 class="title">FLAPPY<br>BIRD</h1>
                    <button class="btn" id="start-btn">START</button>
                    <p class="instructions">TAP or SPACE to Flap</p>
                </div>
                
                <div class="ui-overlay" id="game-over" style="display: none;">
                    <h1 class="title">GAME OVER</h1>
                    <div class="panel" style="background: #ded895; border: 4px solid #543847; width: 80%; margin-bottom: 20px;">
                        <div style="color: #e86101; font-weight:bold; font-family:'Courier New'; text-align:center;">SCORE</div>
                        <div class="score-display" id="final-score" style="margin: 5px 0 15px 0; color: #fff; text-shadow: 2px 2px 0 #000;">0</div>
                        
                        <div style="color: #e86101; font-weight:bold; font-family:'Courier New'; text-align:center;">BEST</div>
                        <div class="score-display" id="best-score-display" style="margin: 5px 0 0 0; color: #fff; text-shadow: 2px 2px 0 #000;">0</div>
                    </div>
                    <button class="btn" id="restart-btn">PLAY AGAIN</button>
                </div>
            </div>
            
            <div class="footer">
                Flappy Bird Clone | Universal Edition
            </div>
        </div>

        <div class="stats-section">
            <div class="panel">
                <h2>🏆 HIGH SCORES</h2>
                <ol class="high-scores-list" id="high-scores-list">
                    <li><span>1.</span> <span>-</span> <span>0</span></li>
                    <li><span>2.</span> <span>-</span> <span>0</span></li>
                    <li><span>3.</span> <span>-</span> <span>0</span></li>
                    <li><span>4.</span> <span>-</span> <span>0</span></li>
                    <li><span>5.</span> <span>-</span> <span>0</span></li>
                </ol>
                <button class="btn reset-btn" id="reset-scores-btn">Reset Scores</button>
            </div>
            
            <div class="panel">
                <h2>📊 LAST RUN</h2>
                <div class="last-score-value" id="last-score-value">0</div>
            </div>
            
            <div class="panel">
                <h2>🎮 CONTROLS</h2>
                <div class="controls">
                    <div class="control-group">
                        <span class="control-label">Difficulty:</span>
                        <select id="difficulty-select">
                            <option value="easy">Easy</option>
                            <option value="medium" selected>Classic</option>
                            <option value="hard">Hard</option>
                        </select>
                    </div>
                    <div class="control-group">
                        <span class="control-label">PC:</span>
                        <span style="color: #FFD700;">Spacebar / Click</span>
                    </div>
                    <div class="control-group">
                        <span class="control-label">Mobile:</span>
                        <span style="color: #FFD700;">Tap Anywhere</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Game Setup
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        
        // Disable image smoothing for pixel art look
        ctx.imageSmoothingEnabled = false;

        // UI Elements
        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const currentScoreDisplay = document.getElementById('current-score');
        const finalScoreDisplay = document.getElementById('final-score');
        const bestScoreDisplay = document.getElementById('best-score-display');
        const difficultySelect = document.getElementById('difficulty-select');
        const highScoresList = document.getElementById('high-scores-list');
        const lastScoreValue = document.getElementById('last-score-value');
        const resetScoresBtn = document.getElementById('reset-scores-btn');
        
        // Game Constants & State
        const FRAME_RATE = 60;
        let gameRunning = false;
        let score = 0;
        let frames = 0;
        let lastTime = 0;
        let groundX = 0;
        
        // High Score System
        const NO_OF_HIGH_SCORES = 5;
        const HIGH_SCORES_KEY = 'flappyBirdHighScores_v2';

        // Difficulty Config
        const difficultySettings = {
            easy: { pipeSpeed: 2, pipeFrequency: 140, gap: 170 },
            medium: { pipeSpeed: 3, pipeFrequency: 100, gap: 140 }, // Classic feel
            hard: { pipeSpeed: 4, pipeFrequency: 80, gap: 110 }
        };
        let currentDifficulty = 'medium';

        // --- ART ASSETS (Procedural Drawing) ---
        // We draw the sprites using code so they NEVER fail to load.
        
        const Sprites = {
            drawBird: function(x, y, rotation) {
                ctx.save();
                ctx.translate(x, y);
                ctx.rotate(rotation);
                
                // Bird Body (Yellow)
                ctx.fillStyle = '#F4CE42'; // Yellow
                ctx.fillRect(-17, -12, 34, 24);
                
                // Outline (Simulated pixel border)
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#543847'; // Dark brown
                ctx.strokeRect(-17, -12, 34, 24);

                // Eye (White with black pupil)
                ctx.fillStyle = '#FFF';
                ctx.fillRect(6, -10, 10, 10);
                ctx.strokeRect(6, -10, 10, 10); // Eye border
                ctx.fillStyle = '#000'; // Pupil
                ctx.fillRect(12, -6, 2, 4);

                // Wing (White/Orange)
                ctx.fillStyle = '#F8F8FF';
                ctx.fillRect(-10, 2, 16, 8);
                ctx.strokeRect(-10, 2, 16, 8);

                // Beak (Orange)
                ctx.fillStyle = '#E86101';
                ctx.fillRect(8, 2, 12, 8);
                ctx.strokeRect(8, 2, 12, 8); // Beak border
                
                ctx.restore();
            },
            
            drawPipe: function(x, y, width, height, isTop) {
                // Main Pipe Green
                ctx.fillStyle = '#73BF2E';
                ctx.fillRect(x, y, width, height);
                
                // Pipe Highlight (Light Green)
                ctx.fillStyle = '#9CE659'; 
                ctx.fillRect(x, y, 5, height); // Left highlight
                ctx.fillRect(x + 10, y, 2, height);
                
                // Border
                ctx.strokeStyle = '#543847';
                ctx.lineWidth = 3;
                ctx.strokeRect(x, y, width, height);

                // Cap (The thick part)
                const capHeight = 24;
                const capY = isTop ? y + height - capHeight : y;
                
                ctx.fillStyle = '#73BF2E';
                ctx.fillRect(x - 2, capY, width + 4, capHeight);
                
                // Cap Highlight
                ctx.fillStyle = '#9CE659';
                ctx.fillRect(x - 2, capY, 5, capHeight);
                ctx.fillRect(x + 10, capY, 2, capHeight);

                // Cap Border
                ctx.strokeRect(x - 2, capY, width + 4, capHeight);
            },
            
            drawBackground: function() {
                // Sky is handled by CSS, but we need the Ground
                // Moving Ground pattern
                const groundHeight = 100; // Taller ground like original
                const y = canvas.height - groundHeight;
                
                // Ground Top (Green)
                ctx.fillStyle = '#DED895'; // Light brown/sand
                ctx.fillRect(0, y, canvas.width, groundHeight);
                
                // Grass Line
                ctx.fillStyle = '#73BF2E';
                ctx.fillRect(0, y, canvas.width, 15);
                ctx.strokeStyle = '#543847';
                ctx.beginPath();
                ctx.moveTo(0, y);
                ctx.lineTo(canvas.width, y);
                ctx.moveTo(0, y+15);
                ctx.lineTo(canvas.width, y+15);
                ctx.stroke();

                // Diagonal stripes for motion
                ctx.fillStyle = '#D0C874'; // Darker sand
                const stripeWidth = 20;
                // Move stripes based on global frame count
                const offset = -(frames * 3) % stripeWidth; 
                
                for(let i = offset; i < canvas.width; i += stripeWidth) {
                   // Simple hatch pattern
                   ctx.fillRect(i, y + 18, 2, groundHeight - 18);
                   ctx.beginPath();
                   ctx.moveTo(i + 10, y + 25);
                   ctx.lineTo(i + 5, y + 35);
                   ctx.stroke();
                }
            },
            
            drawCity: function() {
                // Simple distant city silhouette
                ctx.fillStyle = '#A2DCC3'; // Light teal city
                const cityBase = canvas.height - 100;
                // Static city for now
                ctx.fillRect(0, cityBase - 50, 40, 50);
                ctx.fillRect(50, cityBase - 80, 60, 80);
                ctx.fillRect(120, cityBase - 30, 30, 30);
                ctx.fillRect(160, cityBase - 100, 50, 100);
                ctx.fillRect(220, cityBase - 60, 40, 60);
                ctx.fillRect(270, cityBase - 40, 80, 40);
            }
        };

        // --- GAME OBJECTS ---

        const bird = {
            x: 50,
            y: 150,
            width: 34,
            height: 24,
            gravity: 0.25,
            velocity: 0,
            jump: -4.6,
            rotation: 0,
            
            draw: function() {
                Sprites.drawBird(this.x + this.width/2, this.y + this.height/2, this.rotation);
            },
            
            update: function() {
                // Floor collision
                if (this.y + this.height > canvas.height - 100) {
                    this.y = canvas.height - 100 - this.height;
                    gameOver();
                }
                
                // Ceiling collision
                if (this.y < 0) {
                    this.y = 0;
                    this.velocity = 0;
                }
                
                this.velocity += this.gravity;
                this.y += this.velocity;

                // Rotation based on velocity
                if (this.velocity < this.jump/2) {
                    this.rotation = -25 * Math.PI / 180;
                } else if (this.velocity > 0) {
                    this.rotation += 2 * Math.PI / 180; // Tilt down slowly
                    if (this.rotation > 90 * Math.PI / 180) {
                        this.rotation = 90 * Math.PI / 180;
                    }
                } else {
                    this.rotation = 0;
                }
            },
            
            flap: function() {
                this.velocity = this.jump;
                this.rotation = -25 * Math.PI / 180;
            },
            
            reset: function() {
                this.y = canvas.height / 2 - 50;
                this.velocity = 0;
                this.rotation = 0;
            }
        };

        const pipes = {
            position: [],
            gap: 150,
            dx: 3,
            
            draw: function() {
                for (let i = 0; i < this.position.length; i++) {
                    let p = this.position[i];
                    
                    // Top pipe
                    Sprites.drawPipe(p.x, p.y, p.width, p.height, true);
                    
                    // Bottom pipe
                    // Calculate bottom pipe y position: y + height + gap
                    let bottomPipeY = p.y + p.height + this.gap;
                    let bottomPipeHeight = canvas.height - 100 - bottomPipeY; // 100 is ground height
                    
                    Sprites.drawPipe(p.x, bottomPipeY, p.width, bottomPipeHeight, false);
                }
            },
            
            update: function() {
                const settings = difficultySettings[currentDifficulty];
                
                // Add new pipe
                if (frames % settings.pipeFrequency === 0) {
                    const pipeWidth = 52;
                    const minPipeHeight = 50;
                    const maxPipeHeight = canvas.height - 100 - settings.gap - minPipeHeight;
                    
                    // Random height for top pipe
                    const randomHeight = Math.floor(Math.random() * (maxPipeHeight - minPipeHeight + 1) + minPipeHeight);
                    
                    this.position.push({
                        x: canvas.width,
                        y: 0 - (randomHeight > 300 ? 0 : 0), // Adjust logic if needed
                        y: 0, // Top pipe starts at top
                        height: randomHeight,
                        width: pipeWidth
                    });
                }
                
                for (let i = 0; i < this.position.length; i++) {
                    let p = this.position[i];
                    
                    p.x -= settings.pipeSpeed;
                    
                    // Score counting
                    if (p.x + p.width < bird.x && !p.passed) {
                        score++;
                        p.passed = true;
                        currentScoreDisplay.textContent = score;
                    }
                    
                    // Remove off-screen pipes
                    if (p.x + p.width <= -10) {
                        this.position.shift();
                        i--; // Adjust index since array shifted
                        continue;
                    }
                    
                    // COLLISION
                    // Hit Top Pipe
                    if (bird.x + bird.width - 4 > p.x && bird.x + 4 < p.x + p.width) {
                        // Check Top
                        if (bird.y + 4 < p.height) {
                            gameOver();
                        }
                        // Check Bottom
                        if (bird.y + bird.height - 4 > p.height + settings.gap) {
                            gameOver();
                        }
                    }
                }
            },
            
            reset: function() {
                this.position = [];
                this.gap = difficultySettings[currentDifficulty].gap;
            }
        };

        // --- CORE FUNCTIONS ---

        function loadHighScores() {
            const str = localStorage.getItem(HIGH_SCORES_KEY);
            return JSON.parse(str) || [];
        }
        
        function saveHighScores(scores) {
            localStorage.setItem(HIGH_SCORES_KEY, JSON.stringify(scores));
        }

        function updateUI() {
            const highScores = loadHighScores();
            
            // Update List
            const listItems = highScoresList.querySelectorAll('li');
            for (let i = 0; i < NO_OF_HIGH_SCORES; i++) {
                const entry = highScores[i] || { score: 0, name: '---' };
                const spans = listItems[i].querySelectorAll('span');
                spans[1].textContent = entry.name;
                spans[2].textContent = entry.score;
            }
            
            // Update Last/Best
            if (highScores.length > 0) {
                bestScoreDisplay.textContent = highScores[0].score;
            } else {
                bestScoreDisplay.textContent = 0;
            }
            
            // Last score stored in session (not persistent in LS usually, but we use logic here)
            // For now, simple display
        }

        function checkHighScore(finalScore) {
            const highScores = loadHighScores();
            const lowest = highScores[NO_OF_HIGH_SCORES - 1]?.score || 0;
            
            if (finalScore > lowest || highScores.length < NO_OF_HIGH_SCORES) {
                // Slight delay to not interrupt rage quit
                setTimeout(() => {
                    const name = prompt(`NEW HIGH SCORE: ${finalScore}!\nEnter your name (Max 3 chars):`, "AAA");
                    if (name) {
                        const cleanName = name.substring(0, 8).toUpperCase(); // Limit length
                        highScores.push({ score: finalScore, name: cleanName });
                        highScores.sort((a, b) => b.score - a.score);
                        highScores.splice(NO_OF_HIGH_SCORES); // Keep top 5
                        saveHighScores(highScores);
                        updateUI();
                    }
                }, 100);
            }
            // Update "Last Run" visually
            lastScoreValue.textContent = finalScore;
        }

        function startGame() {
            gameRunning = true;
            startScreen.style.display = 'none';
            score = 0;
            frames = 0;
            currentScoreDisplay.textContent = score;
            bird.reset();
            pipes.reset();
        }

        function gameOver() {
            if (!gameRunning) return; // Prevent double trigger
            gameRunning = false;
            finalScoreDisplay.textContent = score;
            gameOverScreen.style.display = 'flex';
            checkHighScore(score);
        }

        function restartGame() {
            gameOverScreen.style.display = 'none';
            startGame();
        }

        // Loop
        function animate(timestamp) {
            if (timestamp - lastTime < 1000 / FRAME_RATE) {
                requestAnimationFrame(animate);
                return;
            }
            lastTime = timestamp;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            Sprites.drawCity(); // Draw bg
            Sprites.drawBackground(); // Draw moving ground
            
            pipes.draw();
            bird.draw();
            
            if (gameRunning) {
                pipes.update();
                bird.update();
                frames++;
            }
            
            requestAnimationFrame(animate);
        }

        // Inputs
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameRunning) bird.flap();
                else if (startScreen.style.display !== 'none') startGame();
                else if (gameOverScreen.style.display !== 'none') restartGame();
            }
        });
        
        canvas.addEventListener('pointerdown', (e) => {
            e.preventDefault(); // Prevent zoom/scroll
            if (gameRunning) bird.flap();
            else if (startScreen.style.display !== 'none') startGame();
            else if (gameOverScreen.style.display !== 'none') restartGame();
        });

        // Listeners for UI
        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', restartGame);
        resetScoresBtn.addEventListener('click', () => {
            if(confirm("Clear all high scores?")) {
                localStorage.removeItem(HIGH_SCORES_KEY);
                updateUI();
                lastScoreValue.textContent = 0;
            }
        });
        
        difficultySelect.addEventListener('change', function() {
            currentDifficulty = this.value;
            pipes.reset();
            startBtn.focus(); // remove focus from select
        });

        // Init
        updateUI();
        animate();

    </script>
</body>
</html>
